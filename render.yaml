databases:
  - name: vidyaguru_db
    databaseName: vidyaguru
    user: vidyaguru
    plan: free
    region: oregon

services:
  # Backend API
  - type: web
    id: backend
    name: vidyaguru-backend
    runtime: python
    pythonVersion: 3.11
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthCheckPath: /health
    envVars:
      # Database
      - key: DATABASE_URL
        fromDatabase:
          id: vidyaguru_db
          property: connectionString
      
      # Secrets
      - key: SECRET_KEY
        scope: run
        value: ${{ secrets.SECRET_KEY }}
      
      - key: GEMINI_API_KEY
        scope: run
        value: ${{ secrets.GEMINI_API_KEY }}
      
      # Environment
      - key: ENVIRONMENT
        value: production
      
      - key: CORS_ORIGINS
        value: '["https://your-vercel-domain.vercel.app"]'
      
      - key: LOG_LEVEL
        value: INFO
    
    region: oregon
    repo:
      branch: main
