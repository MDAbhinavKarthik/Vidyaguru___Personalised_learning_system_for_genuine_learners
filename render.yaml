databases:
  - name: vidyaguru-db
    databaseName: vidyaguru
    user: vidyaguru
    plan: free
    region: oregon
    ipAllowList: []

services:
  - type: web
    name: vidyaguru-backend
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vidyaguru-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: '["https://your-vercel-domain.vercel.app"]'
      - key: LOG_LEVEL
        value: INFO
